    <script>
        // 获取核心元素
        const settingBtn = document.getElementById('settingBtn');
        const settingPanel = document.getElementById('settingPanel');
        const opacityRange = document.getElementById('opacityRange');
        const opacityValue = document.getElementById('opacityValue');
        const bgSettingBtn = document.getElementById('bgSettingBtn');
        const mobileFileInput = document.getElementById('mobileFileInput');
        const closeBtn = document.getElementById('closeBtn');
        const body = document.body;
        const timeDisplay = document.getElementById('timeDisplay');
        const datePart = document.getElementById('datePart');
        const timePart = document.getElementById('timePart');
        // 目标透明度元素：包含所有导航项
        const targetOpacityElements = [
            settingBtn, 
            settingPanel, 
            opacityRange, 
            ...document.querySelectorAll('.site-item')
        ];
        // 页面加载时强制设置初始透明度为50%
        targetOpacityElements.forEach(el => {
            el.style.opacity = 0.5;
        });
        // 同步时间功能
        function updateSyncTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekDay = weekDays[now.getDay()];
            datePart.textContent = `${year}年${month}月${day}日 ${weekDay}`;
            
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');
            const second = String(now.getSeconds()).padStart(2, '0');
            timePart.textContent = `${hour}:${minute}:${second}`;
        }
        updateSyncTime();
        setInterval(updateSyncTime, 1000);
        // 点击空白处隐藏设置面板
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.func-btn-group') && !e.target.closest('.setting-panel')) {
                settingPanel.classList.remove('show');
            }
        });
        // 点击设置按钮显示/隐藏面板
        settingBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingPanel.classList.toggle('show');
        });
        // 关闭按钮事件
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingPanel.classList.remove('show');
        });
        // 透明度调节逻辑
        opacityRange.addEventListener('input', () => {
            const opacity = opacityRange.value / 100;
            targetOpacityElements.forEach(el => {
                el.style.opacity = opacity;
            });
            opacityValue.textContent = `${opacityRange.value}%`;
        });
        // 判断设备类型（用于文件选择逻辑）
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }
        // 自定义背景逻辑：双端保持原有功能，不影响默认背景区分
        function setBackgroundImage(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const bgStyle = `
                    background-image: url(${event.target.result});
                    background-size: cover;
                    background-repeat: no-repeat;
                    background-position: center;
                    background-attachment: fixed;
                    padding: 20px 15px;
                    transition: background 0.3s, background-image 0.3s;
                `;
                body.style.cssText = `${bgStyle} min-height: 100vh; transform: none; position: static;`;
                alert('图片访问权限已获取，背景图片设置成功！');
                settingPanel.classList.remove('show');
            };
            reader.readAsDataURL(file);
        }
        // 背景设置按钮事件
        bgSettingBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (isMobileDevice()) {
                mobileFileInput.click();
                return;
            }
            try {
                const [fileHandle] = await window.showOpenFilePicker({
                    types: [{description: '图片文件', accept: {'image/*': ['.jpg', '.jpeg', '.png', '.gif', '.webp']}}],
                    multiple: false,
                    excludeAcceptAllOption: true
                });
                const file = await fileHandle.getFile();
                setBackgroundImage(file);
            } catch (err) {
                if (err.name === 'AbortError') alert('已取消图片选择，未获取访问权限');
                else if (err.name === 'SecurityError') alert('图片访问权限被拒绝，请在浏览器设置中允许');
                else if (err.name === 'TypeError') alert('未选择任何图片文件，请重新操作');
                else alert(`背景设置失败：${err.message}，建议换图或检查权限`);
            }
        });
        // 移动端文件选择事件
        mobileFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) {alert('未选择任何图片文件'); return;}
            const validTypes = ['image/jpg', 'image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            if (!validTypes.includes(file.type)) {
                alert('请选择jpg、jpeg、png、gif、webp格式图片');
                mobileFileInput.value = '';
                return;
            }
            setBackgroundImage(file);
            mobileFileInput.value = '';
        });
    </script>
